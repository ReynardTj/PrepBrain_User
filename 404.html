<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WouldYouTry</title>
    <script>
      // GitHub Pages returns 404 for any path that isn't index.html
      // This script redirects back to index.html with the path preserved
      // so React Router (if used) can handle it correctly
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // Encode the path into a query string and redirect to index.html
      var redirectUrl = window.location.origin + '/' + 
        window.location.pathname.split('/')[1] + 
        '/?p=' + encodeURIComponent(path.slice(1)) + 
        (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + 
        hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
